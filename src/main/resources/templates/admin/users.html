<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">Управление пользователями</a>
        <div>
            <a th:href="@{/admin}" class="btn btn-outline-light">Дашборд</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Выход</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h3>Список пользователей</h3>
            <a th:href="@{/admin/users/create}" class="btn btn-light">Создать пользователя</a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Имя</th>
                    <th>Фамилия</th>
                    <th>Возраст</th>
                    <th>Роли</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.firstName}"></td>
                    <td th:text="${user.lastName}"></td>
                    <td th:text="${user.age}"></td>
                    <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name}"
                                      class="badge bg-secondary me-1"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
                           class="btn btn-sm btn-warning">Редакт.</a>
                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Вы уверены?')">Удалить</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
