<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">Создание пользователя</a>
        <div>
            <a th:href="@{/admin/users}" class="btn btn-outline-light">Назад</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Выход</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3>Новый пользователь</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/users/create}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username:</label>
                            <input type="text" class="form-control" th:field="*{username}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль:</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email:</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Имя:</label>
                            <input type="text" class="form-control" th:field="*{firstName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Фамилия:</label>
                            <input type="text" class="form-control" th:field="*{lastName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Возраст:</label>
                            <input type="number" class="form-control" th:field="*{age}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Роли:</label>
                            <div th:each="role : ${allRoles}">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:name="roleIds" th:value="${role.id}"
                                           th:id="'role_' + ${role.id}">
                                    <label class="form-check-label" th:for="'role_' + ${role.id}"
                                           th:text="${role.name}"></label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">Создать</button>
                        <a th:href="@{/admin/users}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
