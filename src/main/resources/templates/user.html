<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">User Panel</a>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-white">Добро пожаловать, <span sec:authentication="name"></span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Выход</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h3 class="mb-0">Профиль пользователя</h3>
                </div>
                <div class="card-body">
                    <h4>Здравствуйте, <span th:text="${user.username}"></span>!</h4>
                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Имя пользователя:</div>
                        <div class="col-md-8" th:text="${user.username}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Email:</div>
                        <div class="col-md-8" th:text="${user.email}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Имя:</div>
                        <div class="col-md-8" th:text="${user.firstName}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Фамилия:</div>
                        <div class="col-md-8" th:text="${user.lastName}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Возраст:</div>
                        <div class="col-md-8" th:text="${user.age}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">Роли:</div>
                        <div class="col-md-8">
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name}"
                                      class="badge bg-secondary me-1"></span>
                        </div>
                    </div>

                    <hr>
                    <div class="text-center">
                        <a th:href="@{/index}" class="btn btn-secondary">На главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
