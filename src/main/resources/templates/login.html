<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-container {
            margin-top: 100px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-header {
            border-radius: 15px 15px 0 0;
            padding: 20px;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px;
            font-weight: bold;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">🔐 Вход в систему</h3>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Неверное имя пользователя или пароль
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Вы успешно вышли из системы
                    </div>

                    <form th:action="@{/perform_login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Имя пользователя</label>
                            <div class="input-group">
                                <span class="input-group-text">👤</span>
                                <input type="text" class="form-control" id="username"
                                       name="username" placeholder="Введите username"
                                       required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Пароль</label>
                            <div class="input-group">
                                <span class="input-group-text">🔒</span>
                                <input type="password" class="form-control" id="password"
                                       name="password" placeholder="Введите пароль" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-login w-100">
                            Войти
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/index}" class="text-decoration-none">← Вернуться на главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
